services:
  # API Backend
  - type: web
    name: cima-investimentos-sistema-api
    env: node
    rootDir: server
    plan: free
    autoDeploy: true
    region: oregon
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npm run prisma:deploy:smart && npm run ledger:rebuild
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_EXPIRES_IN
        value: 30d
      - key: CLIENT_ORIGIN
        value: https://cima-investimentos-sistema.onrender.com,https://cima-frontend-o7sn.onrender.com
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: RATE_LIMIT_LOGIN_MAX
        value: "20"

  # Frontend Estático
  - type: web
    name: cima-investimentos-sistema
    env: static
    plan: free
    autoDeploy: true
    buildCommand: ""
    staticPublishPath: ./
    routes:
      - type: redirect
        source: /*
        destination: /index.html
